<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign in — VoxCPM2 TTS</title>
<style>
  :root {
    --bg: #0b0d12;
    --panel: #151923;
    --border: #232a39;
    --text: #e7ecf3;
    --muted: #8b95a7;
    --accent: #6aa9ff;
    --accent-hover: #7fb7ff;
    --danger: #ff6a6a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .container {
    width: 100%;
    max-width: 380px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
  }
  h1 { margin: 0 0 4px; font-size: 22px; }
  .subtitle { color: var(--muted); margin-bottom: 24px; font-size: 14px; }
  label { display: block; margin-top: 16px; font-size: 13px; color: var(--muted); }
  input {
    width: 100%;
    background: #0d1118;
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 14px;
    margin-top: 6px;
    font-family: inherit;
  }
  button {
    margin-top: 22px;
    width: 100%;
    background: var(--accent);
    color: #0b0d12;
    border: none;
    border-radius: 8px;
    padding: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  button:hover { background: var(--accent-hover); }
  .error {
    margin-top: 16px;
    padding: 10px 12px;
    border-radius: 8px;
    background: rgba(255,106,106,0.12);
    color: var(--danger);
    border: 1px solid rgba(255,106,106,0.3);
    font-size: 13px;
  }
</style>
</head>
<body>
<div class="container">
  <h1>Sign in</h1>
  <div class="subtitle">VoxCPM2 TTS console</div>
  <form method="post" action="/login">
    <label for="email">Email</label>
    <input type="email" id="email" name="email" required autocomplete="username" autofocus />
    <label for="password">Password</label>
    <input type="password" id="password" name="password" required autocomplete="current-password" />
    <button type="submit">Sign in</button>
  </form>
  <!--ERROR-->
</div>
</body>
</html>
